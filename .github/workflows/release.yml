name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build for"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release (native)
        if: matrix.cross == false
        run: cargo build --release --features http --target ${{ matrix.target }} --bin MemoryPilot

      - name: Build release (cross)
        if: matrix.cross == true
        run: cross build --release --features http --target ${{ matrix.target }} --bin MemoryPilot

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/MemoryPilot" "$stage/"
          if [ "$(uname)" = "Darwin" ]; then
            xattr -cr "$stage/MemoryPilot" || true
          fi
          archive="MemoryPilot-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "$stage" MemoryPilot
          shasum -a 256 "$archive" > "$archive.sha256"
          ls -lh "$archive"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemoryPilot-${{ matrix.target }}
          path: |
            MemoryPilot-${{ matrix.target }}.tar.gz
            MemoryPilot-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" dist/*.tar.gz dist/*.sha256 \
            --repo "${{ github.repository }}" \
            --clobber
