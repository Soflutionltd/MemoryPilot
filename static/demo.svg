<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"><rect x="0" y="0" width="880" height="480" rx="18" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/><rect x="0" y="46" width="100%" height="1" fill="#1e293b"/><circle cx="30" cy="23" r="6" fill="#475569"/><circle cx="52" cy="23" r="6" fill="#475569"/><circle cx="74" cy="23" r="6" fill="#475569"/><text x="50%" y="29" font-size="12" fill="#64748b" text-anchor="middle" font-weight="600">MemoryPilot · ~/projects/app · zsh</text><text x="60" y="110" font-size="14" fill="#64748b" font-weight="400" opacity="0">$ <animate attributeName="opacity" from="0" to="1" begin="0.50s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="82" y="110" font-size="14" fill="#f8fafc" font-weight="600" opacity="0">MemoryPilot --version<animate attributeName="opacity" from="0" to="1" begin="0.80s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="138" font-size="14" fill="#94a3b8" font-weight="400" opacity="0">memorypilot 4.2.0  ·  Rust  ·  35 MB<animate attributeName="opacity" from="0" to="1" begin="1.60s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="178" font-size="14" fill="#64748b" font-weight="400" opacity="0">$ <animate attributeName="opacity" from="0" to="1" begin="2.60s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="82" y="178" font-size="14" fill="#f8fafc" font-weight="600" opacity="0">recall(&quot;stripe webhook handler&quot;)<animate attributeName="opacity" from="0" to="1" begin="2.90s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="212" font-size="14" fill="#a3e635" font-weight="600" opacity="0">▸ matched 5 memories in 28 ms<animate attributeName="opacity" from="0" to="1" begin="3.90s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="240" font-size="14" fill="#cbd5e1" font-weight="400" opacity="0">  1. payment_intent.succeeded route /webhooks/stripe<animate attributeName="opacity" from="0" to="1" begin="4.20s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="264" font-size="14" fill="#cbd5e1" font-weight="400" opacity="0">  2. signature verification with STRIPE_WEBHOOK_SECRET<animate attributeName="opacity" from="0" to="1" begin="4.50s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="288" font-size="14" fill="#cbd5e1" font-weight="400" opacity="0">  3. idempotency check (Redis SETNX, 24h TTL)<animate attributeName="opacity" from="0" to="1" begin="4.80s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="312" font-size="14" fill="#cbd5e1" font-weight="400" opacity="0">  4. retry policy: 3 attempts, exponential backoff<animate attributeName="opacity" from="0" to="1" begin="5.10s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="336" font-size="14" fill="#cbd5e1" font-weight="400" opacity="0">  5. fallback: send to dead-letter queue on 5xx<animate attributeName="opacity" from="0" to="1" begin="5.40s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><text x="60" y="380" font-size="14" fill="#a3e635" font-weight="600" opacity="0">▸ R@5 99.1%  ·  cross-encoder rerank  ·  100% local<animate attributeName="opacity" from="0" to="1" begin="6.40s" dur="0.25s" fill="freeze" repeatCount="indefinite" restart="always"/><animate attributeName="opacity" from="1" to="0" begin="11.60s" dur="0.4s" fill="freeze" repeatCount="indefinite"/></text><rect x="394" y="166" width="9" height="18" fill="#a3e635" opacity="0"><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="1s" begin="2.9s;12.00s+2.9s" repeatCount="indefinite"/></rect><text x="440" y="462" font-size="11" fill="#475569" text-anchor="middle" font-family="ui-sans-serif, system-ui">Live demo · loops every 12s · the recall result is real output shape, not mockup</text></svg>