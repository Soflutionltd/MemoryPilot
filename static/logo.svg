<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Brain icon -->
  <g transform="translate(90, 90)">
    <!-- Outer glow circle -->
    <circle cx="0" cy="0" r="68" fill="url(#glow)"/>
    <!-- Brain left hemisphere -->
    <path d="M-8,-38 C-28,-38 -42,-28 -42,-10 C-42,-2 -38,4 -32,8 C-38,14 -40,22 -36,30 C-32,38 -22,42 -12,40 C-10,42 -8,42 -8,42 L-8,-38 Z" 
          fill="none" stroke="#F97316" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Brain right hemisphere -->
    <path d="M8,-38 C28,-38 42,-28 42,-10 C42,-2 38,4 32,8 C38,14 40,22 36,30 C32,38 22,42 12,40 C10,42 8,42 8,42 L8,-38 Z" 
          fill="none" stroke="#F97316" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Brain center line -->
    <line x1="0" y1="-38" x2="0" y2="42" stroke="#F97316" stroke-width="1.5" opacity="0.4"/>
    <!-- Brain folds left -->
    <path d="M-8,-20 C-20,-20 -30,-16 -34,-8" fill="none" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M-8,0 C-18,0 -28,4 -34,10" fill="none" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M-8,18 C-16,18 -24,22 -28,28" fill="none" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <!-- Brain folds right -->
    <path d="M8,-20 C20,-20 30,-16 34,-8" fill="none" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M8,0 C18,0 28,4 34,10" fill="none" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M8,18 C16,18 24,22 28,28" fill="none" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <!-- Memory nodes orbiting -->
    <circle cx="-54" cy="-30" r="4" fill="#F97316" opacity="0.3"/>
    <circle cx="54" cy="-30" r="4" fill="#F97316" opacity="0.3"/>
    <circle cx="-58" cy="20" r="3" fill="#FB923C" opacity="0.25"/>
    <circle cx="58" cy="20" r="3" fill="#FB923C" opacity="0.25"/>
    <circle cx="0" cy="-58" r="3.5" fill="#F97316" opacity="0.3"/>
    <circle cx="0" cy="58" r="3.5" fill="#FB923C" opacity="0.2"/>
    <!-- Connection lines from nodes to brain -->
    <line x1="-54" y1="-30" x2="-38" y2="-24" stroke="#F97316" stroke-width="1" opacity="0.15"/>
    <line x1="54" y1="-30" x2="38" y2="-24" stroke="#F97316" stroke-width="1" opacity="0.15"/>
    <line x1="-58" y1="20" x2="-36" y2="16" stroke="#F97316" stroke-width="1" opacity="0.15"/>
    <line x1="58" y1="20" x2="36" y2="16" stroke="#F97316" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="-58" x2="0" y2="-38" stroke="#F97316" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="58" x2="0" y2="42" stroke="#F97316" stroke-width="1" opacity="0.15"/>
  </g>
  <!-- Text: MemoryPilot -->
  <text x="190" y="92" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-2" fill="#0F172A">
    Memory<tspan fill="#F97316">Pilot</tspan>
  </text>
  <!-- Tagline -->
  <text x="192" y="130" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="0.5">
    MCP Memory Server
  </text>
</svg>
